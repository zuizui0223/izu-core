name: Campanula Biological Positive Control

on:
  pull_request:
    paths:
      - "channel_id/biological_positive_control.py"
      - "scripts/evaluate_biological_positive_control.py"
      - "tests/test_biological_positive_control.py"
      - "data/predictive_meta/campanula_biological_positive_control_blind.csv"
      - "docs/CAMPANULA_BIOLOGICAL_POSITIVE_CONTROL_PROTOCOL.md"
      - "paper/render_blind_photo_contact_sheets.py"
      - ".github/workflows/campanula-biological-positive-control.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-blind:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and image dependency
        run: |
          python -m pip install -e .
          python -m pip install pillow pytest
      - name: Evaluate blind pre-key gate
        run: |
          python scripts/evaluate_biological_positive_control.py \
            --output-dir artifacts/campanula_biological_positive_control
          python -m pytest tests/test_biological_positive_control.py
      - name: Render blind contact sheet without regional key
        run: |
          python paper/render_blind_photo_contact_sheets.py \
            --blind data/predictive_meta/campanula_biological_positive_control_blind.csv \
            --output-dir artifacts/campanula_biological_positive_control
      - uses: actions/upload-artifact@v4
        with:
          name: campanula-biological-positive-control-blind
          path: artifacts/campanula_biological_positive_control
          if-no-files-found: error
          retention-days: 90
