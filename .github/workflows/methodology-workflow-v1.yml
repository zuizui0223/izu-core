name: Methodology workflow v1

on:
  push:
    branches: [agent/methodology-workflow-v1]
  pull_request:
    paths:
      - channel_id/study_workflow.py
      - channel_id/scenario_workflow.py
      - channel_id/negative_control.py
      - scripts/run_study_workflow.py
      - scripts/run_scenario_workflow.py
      - scripts/run_negative_control.py
      - scripts/prepare_shimahotarubukuro_example.py
      - tests/test_study_workflow.py
      - tests/test_scenario_workflow.py
      - tests/test_negative_control.py
      - examples/synthetic_threshold/summary.csv
      - examples/synthetic_scenarios/summary.csv
      - examples/negative_control/contrasts.csv
      - .github/workflows/methodology-workflow-v1.yml
  workflow_dispatch:

jobs:
  test-and-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e . pytest
      - run: pytest tests/test_study_workflow.py tests/test_threshold_identifiability.py tests/test_scenario_workflow.py tests/test_negative_control.py
      - run: |
          python scripts/run_study_workflow.py examples/synthetic_threshold/summary.csv \
            --output results/methodology-example.json --replicates 300
      - run: |
          python scripts/run_scenario_workflow.py examples/synthetic_scenarios/summary.csv \
            --output results/scenario-example.json --replicates 100
      - run: |
          python scripts/run_negative_control.py examples/negative_control/contrasts.csv \
            --output results/negative-control-example.json \
            --equivalence-margin 0.5 --replicates 300
      - uses: actions/upload-artifact@v4
        with:
          name: methodology-workflow-example
          path: results/*.json
