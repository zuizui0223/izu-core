name: Methodology workflow v1

on:
  push:
    branches: [agent/methodology-workflow-v1]
  pull_request:
    paths:
      - channel_id/study_workflow.py
      - scripts/run_study_workflow.py
      - tests/test_study_workflow.py
      - examples/synthetic_threshold/summary.csv
      - .github/workflows/methodology-workflow-v1.yml
  workflow_dispatch:

jobs:
  test-and-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e . pytest
      - run: pytest tests/test_study_workflow.py tests/test_threshold_identifiability.py
      - run: |
          python scripts/run_study_workflow.py \
            examples/synthetic_threshold/summary.csv \
            --output results/methodology-example.json \
            --replicates 1000
      - uses: actions/upload-artifact@v4
        with:
          name: methodology-workflow-example
          path: results/methodology-example.json
