name: Public Visual Signature Screen
on:
  pull_request:
    paths:
      - "channel_id/public_visual_signature.py"
      - "paper/build_public_visual_signature_manifest.py"
      - "paper/extract_public_visual_fingerprints.py"
      - "paper/analyze_public_visual_signatures.py"
      - "paper/functional_group_classification.csv"
      - "data/predictive_meta/public_visual_signature_contract.csv"
      - "tests/test_public_visual_signature.py"
      - ".github/workflows/public-visual-signature.yml"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install image dependencies
        run: |
          python -m pip install -e .
          python -m pip install numpy pillow
      - name: Build cohort and feature tables
        run: |
          python paper/build_public_visual_signature_manifest.py --classification paper/functional_group_classification.csv --out artifacts/public_visual_signature/manifest.csv --max-specialists 12 --max-generalists 12 --min-islands 3 --min-total-occ 10
          python paper/extract_public_visual_fingerprints.py --manifest artifacts/public_visual_signature/manifest.csv --output-dir artifacts/public_visual_signature/raw --per-region 6 --sleep-seconds 0.2
      - name: Estimate available transition signatures
        run: |
          python paper/analyze_public_visual_signatures.py --blind-features artifacts/public_visual_signature/raw/visual_fingerprint_blind.csv --key artifacts/public_visual_signature/raw/visual_fingerprint_key.csv --manifest artifacts/public_visual_signature/manifest.csv --contract data/predictive_meta/public_visual_signature_contract.csv --output-dir artifacts/public_visual_signature/analysis --min-images-per-regime 2 --bootstrap-draws 500 --tolerance 0.25
      - uses: actions/upload-artifact@v4
        with:
          name: public-visual-signature-screen
          path: artifacts/public_visual_signature
          if-no-files-found: error
          retention-days: 90
