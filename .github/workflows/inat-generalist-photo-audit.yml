name: Izu Generalist Photo Availability Audit

on:
  push:
    paths:
      - "paper/inat_generalist_photo_audit.py"
      - ".github/workflows/inat-generalist-photo-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Query iNaturalist availability
        run: python paper/inat_generalist_photo_audit.py
      - uses: actions/upload-artifact@v4
        with:
          name: inat-generalist-photo-availability
          path: paper/evidence_screening/inat_generalist_photo_availability.csv
          if-no-files-found: error
          retention-days: 30
