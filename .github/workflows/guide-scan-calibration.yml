name: Campanula Guide Scan Calibration

on:
  pull_request:
    paths:
      - "channel_id/guide_scan_calibration.py"
      - "scripts/validate_guide_scan_calibration.py"
      - "data/predictive_meta/campanula_guide_scan_summary.csv"
      - "data/predictive_meta/campanula_channel_shape_v1_1.csv"
      - "data/predictive_meta/campanula_calibration_observations.csv"
      - "data/predictive_meta/two_breakpoint_prediction_contract.csv"
      - "tests/test_guide_scan_calibration.py"
      - "tests/test_predictive_meta.py"
      - "docs/CAMPANULA_GUIDE_SCAN_CALIBRATION_V1_1.md"
      - ".github/workflows/guide-scan-calibration.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install local package and tests
        run: |
          python -m pip install -e .
          python -m pip install pytest
      - name: Validate guide calibration and write report
        run: |
          python scripts/validate_guide_scan_calibration.py \
            --output-dir artifacts/guide_scan_calibration
      - name: Run calibration and scenario tests
        run: |
          python -m pytest \
            tests/test_guide_scan_calibration.py \
            tests/test_predictive_meta.py \
            tests/test_prediction_contract_lock.py
      - uses: actions/upload-artifact@v4
        with:
          name: campanula-guide-scan-calibration
          path: artifacts/guide_scan_calibration
          if-no-files-found: error
          retention-days: 90
