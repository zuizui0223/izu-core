name: Meta-analysis pipeline

on:
  push:
    branches: [main]
    paths:
      - 'paper/comprehensive_sweep.py'
      - 'paper/izu_entomophilous_candidates.csv'
      - 'paper/evidence_ranks.csv'
      - 'channel_id/izu_gradient_benchmark.py'
      - 'channel_id/island_multichannel.py'
      - 'scripts/run_island_multichannel_analysis.py'
      - 'data/inoue_literature_island_traits.csv'
      - '.github/workflows/meta-analysis-pipeline.yml'
  pull_request:
    paths:
      - 'paper/comprehensive_sweep.py'
      - 'paper/izu_entomophilous_candidates.csv'
      - 'paper/evidence_ranks.csv'
      - 'channel_id/izu_gradient_benchmark.py'
      - 'channel_id/island_multichannel.py'
      - 'scripts/run_island_multichannel_analysis.py'
      - 'data/inoue_literature_island_traits.csv'
      - '.github/workflows/meta-analysis-pipeline.yml'
  workflow_dispatch:

jobs:
  meta-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'

      - name: Comprehensive detectability sweep (Result 1)
        run: |
          mkdir -p artifacts
          python paper/comprehensive_sweep.py --replicates 200 > artifacts/comprehensive_sweep.csv
          wc -l artifacts/comprehensive_sweep.csv

      - name: Calibration seed — island multichannel analysis (Section 6)
        run: |
          python scripts/run_island_multichannel_analysis.py \
            --input data/inoue_literature_island_traits.csv \
            --output-json artifacts/island_multichannel_analysis.json \
            --output-md artifacts/island_multichannel_analysis.md

      - name: Validate evidence-ranked candidate table
        run: |
          python paper/validate_meta_inputs.py

      - name: Upload meta-analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meta-analysis-pipeline
          path: |
            artifacts/comprehensive_sweep.csv
            artifacts/island_multichannel_analysis.json
            artifacts/island_multichannel_analysis.md
            paper/izu_entomophilous_candidates.csv
            paper/evidence_ranks.csv
          if-no-files-found: error
