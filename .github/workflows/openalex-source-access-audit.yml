name: OpenAlex Source Access Audit

on:
  pull_request:
    paths:
      - "paper/openalex_source_access_audit.py"
      - "paper/evidence_screening/known_source_upgrade_queue.csv"
      - ".github/workflows/openalex-source-access-audit.yml"
  push:
    paths:
      - "paper/openalex_source_access_audit.py"
      - "paper/evidence_screening/known_source_upgrade_queue.csv"
      - ".github/workflows/openalex-source-access-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit OpenAlex access routes
        run: python paper/openalex_source_access_audit.py
      - uses: actions/upload-artifact@v4
        with:
          name: openalex-source-access
          path: paper/evidence_screening/openalex_source_access.csv
          if-no-files-found: error
          retention-days: 30
