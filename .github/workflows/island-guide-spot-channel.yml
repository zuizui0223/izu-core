name: Island Guide Spot Channel

on:
  pull_request:
    paths:
      - data/island_guide_spot_observations_template.csv
      - scripts/validate_island_guide_spot_channel.py
      - tests/test_island_guide_spot_channel.py
      - .github/workflows/island-guide-spot-channel.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: |
          python -m pip install -e .[dev]
          pytest tests/test_island_guide_spot_channel.py
      - name: Build report
        run: |
          python scripts/validate_island_guide_spot_channel.py --output artifacts/island_guide_spot_channel_report.md
      - uses: actions/upload-artifact@v4
        with:
          name: island-guide-spot-channel-report
          path: artifacts/island_guide_spot_channel_report.md
          if-no-files-found: error
          retention-days: 30
