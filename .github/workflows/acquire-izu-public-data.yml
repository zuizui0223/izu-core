name: Acquire Izu public data

on:
  workflow_dispatch:
  push:
    branches:
      - agent/consolidate-current-evidence-state
    paths:
      - "config/izu_public_data_source_lock.json"
      - "scripts/acquire_izu_public_data.py"
      - "tests/test_izu_public_data_acquisition.py"
      - ".github/workflows/acquire-izu-public-data.yml"
  pull_request:
    paths:
      - "config/izu_public_data_source_lock.json"
      - "scripts/acquire_izu_public_data.py"
      - "tests/test_izu_public_data_acquisition.py"
      - ".github/workflows/acquire-izu-public-data.yml"

permissions:
  contents: read

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test extraction logic
        run: python -m pytest tests/test_izu_public_data_acquisition.py
      - name: Acquire pinned upstream snapshot
        run: >-
          python scripts/acquire_izu_public_data.py
          --source-lock config/izu_public_data_source_lock.json
          --output-dir artifacts/izu_public_data
          --cache-dir .cache/izu_public_data
      - uses: actions/upload-artifact@v4
        with:
          name: izu-public-data-audit
          path: artifacts/izu_public_data
