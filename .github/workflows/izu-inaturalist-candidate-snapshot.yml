name: Izu iNaturalist Candidate Snapshot

on:
  pull_request:
    paths:
      - "configs/izu_inaturalist_snapshot_targets.json"
      - "configs/izu_island_proxy_points.json"
      - "scripts/fetch_izu_inaturalist_snapshots.py"
      - "scripts/extract_inaturalist_trait_photo_candidates.py"
      - "scripts/build_inaturalist_photo_proxy_queue.py"
      - "scripts/build_blinded_guide_photo_review_bundle.py"
      - "channel_id/inaturalist_trait_photos.py"
      - "channel_id/inaturalist_photo_proxy_queue.py"
      - "channel_id/guide_photo_review.py"
      - ".github/workflows/izu-inaturalist-candidate-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install local package for review utilities
        run: python -m pip install -e .

      - name: Fetch Izu-scoped iNaturalist candidates
        id: fetch
        continue-on-error: true
        run: |
          python scripts/fetch_izu_inaturalist_snapshots.py \
            --config configs/izu_inaturalist_snapshot_targets.json \
            --output-dir izu_inaturalist_candidate_snapshots \
            --max-records 5000

      - name: Extract flower-photo candidate inventory
        if: steps.fetch.outcome == 'success'
        run: |
          python scripts/extract_inaturalist_trait_photo_candidates.py \
            --snapshot-root izu_inaturalist_candidate_snapshots \
            --output-csv izu_inaturalist_candidate_snapshots/trait_photo_candidates.csv \
            --output-md izu_inaturalist_candidate_snapshots/TRAIT_PHOTO_CANDIDATES.md

      - name: Build proxy-only reviewer queue
        if: steps.fetch.outcome == 'success'
        run: |
          python scripts/build_inaturalist_photo_proxy_queue.py \
            --candidates izu_inaturalist_candidate_snapshots/trait_photo_candidates.csv \
            --proxy-config configs/izu_island_proxy_points.json \
            --output-csv izu_inaturalist_candidate_snapshots/trait_photo_proxy_review_queue.csv \
            --output-md izu_inaturalist_candidate_snapshots/TRAIT_PHOTO_PROXY_QUEUE.md

      - name: Build geography-first blinded guide review bundle
        if: steps.fetch.outcome == 'success'
        run: |
          python scripts/build_blinded_guide_photo_review_bundle.py \
            --proxy-queue izu_inaturalist_candidate_snapshots/trait_photo_proxy_review_queue.csv \
            --output-dir izu_inaturalist_candidate_snapshots/guide_photo_review_bundle

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: izu-inaturalist-candidate-snapshots
          path: izu_inaturalist_candidate_snapshots
          if-no-files-found: error
          retention-days: 30

      - name: Enforce complete declared retrieval
        if: always()
        run: |
          if [ "${{ steps.fetch.outcome }}" != "success" ]; then
            echo "A target failed or reached the configured record ceiling. Inspect the uploaded artifact."
            exit 1
          fi
