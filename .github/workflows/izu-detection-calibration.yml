name: Virtual Izu Detection Calibration

on:
  pull_request:
    paths:
      - 'channel_id/**'
      - 'scripts/generate_izu_detection_calibration_report.py'
      - '.github/workflows/izu-detection-calibration.yml'
  workflow_dispatch:

jobs:
  detection-calibration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Generate virtual finite detection calibration report
        run: |
          python scripts/generate_izu_detection_calibration_report.py \
            --replicates 25 \
            --output artifacts/izu_detection_calibration.md
          cat artifacts/izu_detection_calibration.md
      - name: Upload detection calibration report
        uses: actions/upload-artifact@v4
        with:
          name: izu-detection-calibration
          path: artifacts/izu_detection_calibration.md
          if-no-files-found: error
          retention-days: 14
