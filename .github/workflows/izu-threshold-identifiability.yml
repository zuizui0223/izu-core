name: Izu threshold identifiability

on:
  pull_request:
    paths:
      - "channel_id/threshold_identifiability.py"
      - "scripts/run_threshold_identifiability.py"
      - "tests/test_threshold_identifiability.py"
      - "data/design/izu_threshold_regimes.csv"
      - "data/design/izu_threshold_hypotheses.json"
      - "docs/IZU_THRESHOLD_ANALYSIS.md"
      - ".github/workflows/izu-threshold-identifiability.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e . pytest
      - run: pytest tests/test_threshold_identifiability.py
      - run: |
          python scripts/run_threshold_identifiability.py \
            --regimes data/design/izu_threshold_regimes.csv \
            --output artifacts/threshold_identifiability.json \
            --replicates 5000
      - uses: actions/upload-artifact@v4
        with:
          name: izu-threshold-identifiability
          path: artifacts/threshold_identifiability.json
          if-no-files-found: error
