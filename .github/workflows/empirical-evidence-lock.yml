name: Empirical Evidence Lock

on:
  pull_request:
    paths:
      - "channel_id/empirical_evidence_lock.py"
      - "scripts/build_empirical_evidence_lock.py"
      - "data/two_breakpoint_evidence/**"
      - ".github/workflows/empirical-evidence-lock.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build direct-observation evidence report
        shell: bash
        env:
          PYTHONPATH: .
        run: |
          set -o pipefail
          mkdir -p empirical_evidence_lock
          python scripts/build_empirical_evidence_lock.py \
            --data-dir data/two_breakpoint_evidence \
            --output empirical_evidence_lock/EMPIRICAL_EVIDENCE_LOCK.md \
            2>&1 | tee empirical_evidence_lock/build.log
          test "${PIPESTATUS[0]}" -eq 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: empirical-evidence-lock
          path: empirical_evidence_lock
          if-no-files-found: error
          retention-days: 30
