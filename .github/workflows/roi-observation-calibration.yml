name: ROI Observation Calibration
on:
  pull_request:
    paths:
      - "channel_id/roi_observation_calibration.py"
      - "channel_id/roi_dual_control.py"
      - "channel_id/roi_visual_core.py"
      - "paper/roi_metrics.py"
      - "paper/roi_dual_control.py"
      - "data/predictive_meta/generalist_negative_control_card_ledger.csv"
      - "tests/test_roi_calibration.py"
      - "tests/test_roi_dual_control.py"
      - ".github/workflows/roi-observation-calibration.yml"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install image dependencies
        run: |
          python -m pip install -e .
          python -m pip install numpy pillow pytest
      - name: Test dual-control gate logic
        run: python -m pytest tests/test_roi_calibration.py tests/test_roi_dual_control.py
      - name: Evaluate automatic crop proposals on flat and sensitivity controls
        run: |
          python -m paper.roi_dual_control \
            --ledger data/predictive_meta/generalist_negative_control_card_ledger.csv \
            --output-dir artifacts/roi_observation_calibration \
            --sleep-seconds 0.2
      - uses: actions/upload-artifact@v4
        with:
          name: roi-observation-calibration
          path: artifacts/roi_observation_calibration
          if-no-files-found: error
          retention-days: 90
